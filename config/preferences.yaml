# Job search preferences
roles:
  - "Senior QA Engineer"
  - "Lead QA Engineer"
  - "Senior Software QA Engineer"
  - "Lead Software QA Engineer"
  - "AI Automation Engineer"
  - "AI QA Engineer"
  - "Senior Product Manager"
  - "ICT Officer"

locations:
  - "Remote"
  - "Nairobi, Kenya"
  - "Kenya"

# Jobs scoring below this threshold are skipped entirely
auto_apply_threshold: 75      # apply automatically
review_threshold: 65          # flag for human review; below this, skip

# Salary floor (USD/year). Set to 0 to disable filtering.
salary_floor: 0

# Job boards to search: linkedin, indeed, glassdoor, zip_recruiter, google
# Note: indeed returns 400 for worldwide; glassdoor needs a specific country.
# LinkedIn works globally and is the most reliable for remote/Kenya roles.
sources:
  - linkedin

# Keywords that disqualify a listing immediately
exclude_keywords:
  - "requires US work authorization"
  - "onsite only"
  - "clearance required"
  - "PLC programmer"
  - "SCADA"
  - "industrial automation"
  - "manufacturing automation"
  - "electrical engineer"
  - "mechanical engineer"
  - "robotics"
  - "quality control"
  - "QC inspector"
  - "food safety"
  - "ISO 9001"
  - "production line"
  - "factory"
  - "new grad"
  - "entry level"
  - "junior"
  - "intern"
  - "night shift"

results_per_search: 10
