name: Job Agent Daily Digest

on:
  schedule:
    # 7:00 AM EAT (East Africa Time = UTC+3) → 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      # Cache SQLite DB between runs so seen jobs are remembered
      - name: Restore jobs DB cache
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_number }}
          restore-keys: |
            jobs-db-

      - name: Run digest
        run: uv run main.py --digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
